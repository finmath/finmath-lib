name: finmath lib

on:
  push:
  pull_request:

jobs:
  build:
    name: 🛠️ Build - Java 17
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build with Maven (no tests, no checkstyle)
        run: mvn -B -Dmaven.test.skip=true -DskipTests=true -Dcheckstyle.skip=true clean compile

  javadoc:
    name: 📚 JavaDoc
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Restore Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Generate JavaDoc (no tests, no checkstyle)
        run: mvn -B -Dmaven.test.skip=true -DskipTests=true -Dcheckstyle.skip=true -Dadditionalparam='-Xdoclint:none' javadoc:javadoc

  checkstyle:
    name: 🔍 Checkstyle
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Restore Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Run Checkstyle
        run: mvn -B -Dcheckstyle.skip=false checkstyle:check

  summary:
    name: 🥉🥈🥇 Summary
    runs-on: ubuntu-latest
    needs: autograding
    if: always()
    steps:
    - name: Fetch annotations for this job
      env:
        GH_TOKEN: ${{ github.token }}
        REPO: ${{ github.repository }}
        RUN_ID: ${{ github.run_id }}
        JOB_NAME: "Autograding"
      run: |
        echo "🔎 Getting job info for run $RUN_ID..."
        # List jobs in the current run
        JOBS_JSON=$(gh api repos/$REPO/actions/runs/$RUN_ID/jobs)
  
        # Extract the job id for this job name
        JOB_ID=$(echo "$JOBS_JSON" | jq -r --arg JOB_NAME "$JOB_NAME" '.jobs[] | select(.name==$JOB_NAME) | .id')
  
        if [ -z "$JOB_ID" ]; then
          echo "❌ Could not find job ID for $JOB_NAME"
          exit 1
        fi
        echo "✅ Job ID: $JOB_ID"
  
        # Retrieve job info (includes check_run_url)
        JOB_INFO=$(gh api repos/$REPO/actions/jobs/$JOB_ID)
        CHECK_RUN_URL=$(echo "$JOB_INFO" | jq -r '.check_run_url')
  
        if [ -z "$CHECK_RUN_URL" ] || [ "$CHECK_RUN_URL" == "null" ]; then
          echo "❌ No check_run_url found for job"
          exit 1
        fi
        echo "✅ Check run URL: $CHECK_RUN_URL"
  
        # Get the check run and its annotations URL
        CHECK_RUN=$(gh api "$CHECK_RUN_URL")
        ANNOTATIONS_URL=$(echo "$CHECK_RUN" | jq -r '.output.annotations_url')
  
        if [ -z "$ANNOTATIONS_URL" ] || [ "$ANNOTATIONS_URL" == "null" ]; then
          echo "❌ No annotations URL found"
          exit 1
        fi
        echo "✅ Annotations URL: $ANNOTATIONS_URL"
  
        # Fetch and print annotations
        echo "📋 Fetching annotations..."
        RESULT=$(gh api "$ANNOTATIONS_URL" | jq -r '.[] | select(.message | test("Node\\.js 20 actions are deprecated") | not) | "**\(.message)**"')

        echo "### Autograding Summary: " >> $GITHUB_STEP_SUMMARY
        echo "$RESULT" >> $GITHUB_STEP_SUMMARY